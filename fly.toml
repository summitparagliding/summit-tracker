app = "summit-paragliding"
primary_region = "yyz"  # Toronto — closest available to Quebec

[build]

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"
  PORT = "3000"
  HOST = "0.0.0.0"
  BODY_SIZE_LIMIT = "104857600"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "summit_data"
  destination = "/data"
