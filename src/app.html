<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />

    <!-- Primary favicon -->
    <link rel="icon" href="%sveltekit.assets%/favicon.ico?v=3" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32"  href="%sveltekit.assets%/icon-32.png?v=3" />
    <link rel="icon" type="image/png" sizes="16x16"  href="%sveltekit.assets%/icon-16.png?v=3" />
    <link rel="icon" type="image/png" sizes="192x192" href="%sveltekit.assets%/icon-192.png?v=3" />

    <!-- Apple / iOS home screen -->
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png?v=3" />

    <!-- PWA manifest -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060d16" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Summit" />

    <!-- OG image -->
    <meta property="og:image" content="%sveltekit.assets%/app-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display:contents">%sveltekit.body%</div>
  </body>
</html>
